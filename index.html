<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First GitHub Site</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
      }
      h1 {
        font-size: 3rem;
      }
      button {
        background: white;
        color: #764ba2;
        border: none;
        padding: 12px 24px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 8px;
        margin-top: 20px;
      }
      button:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <h1>🚀 Hello, GitHub Pages!</h1>
    <p>This site was built in VSCode and published with Git</p>
    <button onclick="showMessage()">Click Me</button>

    <script>
      function showMessage() {
        alert("🎉 Success! Your code is now live on GitHub!");
      }
    </script>
  </body>
</html>
